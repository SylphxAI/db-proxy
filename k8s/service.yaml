apiVersion: v1
kind: Service
metadata:
  name: sylphx-db-proxy
  namespace: sylphx-infra
  labels:
    app: sylphx-db-proxy
    app.kubernetes.io/instance: db-proxy
  annotations:
    # Cilium L2 IPAM — shares the public-lb VIP (91.98.183.14) with main-gateway.
    # External traffic enters via Hetzner Cloud LB (138.199.132.65):
    #   :5432 → NodePort 31232 → sylphx-db-proxy:5432 (Postgres SNI proxy)
    #   :3306 → NodePort 30484 → sylphx-db-proxy:3306 (MySQL SNI proxy)
    io.cilium/lb-ipam-ips: "91.98.183.14"
    lbipam.cilium.io/sharing-key: "public-lb"
spec:
  type: LoadBalancer
  allocateLoadBalancerNodePorts: true
  externalTrafficPolicy: Cluster
  selector:
    app: sylphx-db-proxy
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
      nodePort: 31232
    - name: mysql
      port: 3306
      protocol: TCP
      targetPort: 3306
      nodePort: 30484
