apiVersion: v1
kind: Service
metadata:
  name: sylphx-db-proxy
  namespace: sylphx-infra
  labels:
    app: sylphx-db-proxy
    app.kubernetes.io/instance: db-proxy
spec:
  # NodePort (not LoadBalancer) — we don't need a Cilium L2 VIP.
  # Traffic enters via Hetzner Cloud LB (138.199.132.65):
  #   :5432 → NodePort 31232 → sylphx-db-proxy:5432 (Postgres SNI proxy)
  #   :3306 → NodePort 30484 → sylphx-db-proxy:3306 (MySQL SNI proxy)
  #   :6379 → NodePort 30637 → sylphx-db-proxy:6379 (Redis SNI proxy)
  type: NodePort
  selector:
    app: sylphx-db-proxy
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
      nodePort: 31232
    - name: mysql
      port: 3306
      protocol: TCP
      targetPort: 3306
      nodePort: 30484
    - name: redis
      port: 6379
      protocol: TCP
      targetPort: 6379
      nodePort: 30637
