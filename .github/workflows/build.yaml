name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "package.json"
      - "bun.lock"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: sylphx-standard
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to Harbor
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE="registry.sylphx.com/library/sylphx-db-proxy"

          docker build -t "${IMAGE}:${SHORT_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"

          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Update deployment manifest
        run: |
          sed -i "s|image: registry.sylphx.com/library/sylphx-db-proxy:.*|image: registry.sylphx.com/library/sylphx-db-proxy:${IMAGE_TAG}|" k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "deploy: ${IMAGE_TAG}"
          git push
